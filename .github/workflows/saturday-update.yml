name: Saturday Market Update

on:
  schedule:
    - cron: '0 1 * * 0'
  workflow_dispatch:

jobs:
  update-market-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch market data and calculate max pain
        run: |
          pip install yfinance --break-system-packages -q
          python3 << 'PYEOF'
          import yfinance as yf
          import json, math, datetime

          # Pull 30 days of history for SPX and VIX
          spx_hist = yf.Ticker("^GSPC").history(period="30d")
          vix_hist = yf.Ticker("^VIX").history(period="30d")

          # Find the most recent Friday in history (the actual Friday close)
          last_friday_idx = None
          for idx_dt in reversed(spx_hist.index):
              if idx_dt.weekday() == 4:  # 4 = Friday
                  last_friday_idx = idx_dt
                  break

          if not last_friday_idx:
              last_friday_idx = spx_hist.index[-1]

          last_friday = last_friday_idx.to_pydatetime()
          date_str = last_friday.strftime("%Y-%m-%d")

          # Use the CLOSING price from that specific Friday — not live price
          spx = round(float(spx_hist.loc[last_friday_idx, "Close"]), 2)
          vix = round(float(vix_hist.loc[last_friday_idx, "Close"]), 2) if last_friday_idx in vix_hist.index else round(float(vix_hist["Close"].iloc[-1]), 2)

          print(f"Last Friday: {date_str}  SPX close={spx}  VIX close={vix}")

          # HV20 from recent closes
          closes = spx_hist["Close"].tolist()
          log_rets = [math.log(closes[i]/closes[i-1]) for i in range(1,len(closes)) if closes[i] and closes[i-1]]
          if len(log_rets) >= 2:
              mean = sum(log_rets)/len(log_rets)
              var = sum((r-mean)**2 for r in log_rets)/(len(log_rets)-1)
              hv20 = round(math.sqrt(var)*math.sqrt(252)*100, 2)
          else:
              hv20 = None

          # Coming week = Mon through Fri after last Friday
          mon = last_friday + datetime.timedelta(days=3)
          fri = last_friday + datetime.timedelta(days=7)
          weekof = f"{mon.month}/{mon.day}-{fri.month}/{fri.day}"
          print(f"Coming week: {mon.date()} to {fri.date()}  weekof={weekof}")

          max_pain = None
          top_puts = []
          top_calls = []
          options_expiry = None

          try:
              spx_opts = yf.Ticker("^SPX")
              expirations = list(spx_opts.options)
              print(f"Available expirations (first 8): {expirations[:8]}")

              # Find last expiry within the coming Mon-Fri window
              target_exp = None
              for exp in expirations:
                  exp_date = datetime.datetime.strptime(exp, "%Y-%m-%d").date()
                  days_from_mon = (exp_date - mon.date()).days
                  if 0 <= days_from_mon <= 4:
                      target_exp = exp

              if not target_exp and expirations:
                  target_exp = expirations[0]
                  print("No match in coming week, using first available")

              print(f"Using expiry: {target_exp}")
              exp_dt = datetime.datetime.strptime(target_exp, "%Y-%m-%d")
              options_expiry = f"{exp_dt.month}/{exp_dt.day}"

              chain = spx_opts.option_chain(target_exp)
              calls_df = chain.calls
              puts_df = chain.puts
              print(f"Calls: {len(calls_df)} | Puts: {len(puts_df)}")

              lo, hi = spx * 0.85, spx * 1.15
              calls_df = calls_df[(calls_df["strike"] >= lo) & (calls_df["strike"] <= hi) & (calls_df["openInterest"] > 0)]
              puts_df = puts_df[(puts_df["strike"] >= lo) & (puts_df["strike"] <= hi) & (puts_df["openInterest"] > 0)]

              call_oi = dict(zip(calls_df["strike"].tolist(), calls_df["openInterest"].tolist()))
              put_oi = dict(zip(puts_df["strike"].tolist(), puts_df["openInterest"].tolist()))
              all_strikes = sorted(set(list(call_oi.keys()) + list(put_oi.keys())))
              print(f"Strikes in range: {len(all_strikes)}")

              min_pain = float("inf")
              for s in all_strikes:
                  cp = sum((s-k)*oi for k,oi in call_oi.items() if k < s)
                  pp = sum((k-s)*oi for k,oi in put_oi.items() if k > s)
                  if cp+pp < min_pain:
                      min_pain = cp+pp
                      max_pain = int(s)

              print(f"Max pain: {max_pain}")
              top_puts = sorted([{"strike":int(k),"oi":int(v)} for k,v in put_oi.items()], key=lambda x:-x["oi"])[:4]
              top_calls = sorted([{"strike":int(k),"oi":int(v)} for k,v in call_oi.items()], key=lambda x:-x["oi"])[:4]

          except Exception as e:
              print(f"Options error: {e}")
              import traceback; traceback.print_exc()

          payload = {
              "spx": spx, "vix": vix, "hv20": hv20,
              "date": date_str, "weekof": weekof,
              "updated": datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"),
              "options": {"expiry": options_expiry, "maxPain": max_pain, "topPuts": top_puts, "topCalls": top_calls}
          }
          with open("data/market.json", "w") as f:
              json.dump(payload, f, indent=2)
          print(f"Done: SPX={spx} VIX={vix} maxPain={max_pain} expiry={options_expiry} weekof={weekof}")
          PYEOF

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/market.json
          git diff --staged --quiet || git commit -m "chore: Saturday market update"
          git push
