name: Saturday Market Update

on:
  schedule:
    - cron: '0 1 * * 0'
  workflow_dispatch:

jobs:
  update-market-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch market data and calculate max pain
        run: |
          pip install yfinance --break-system-packages -q
          python3 << 'PYEOF'
          import yfinance as yf
          import json, math, datetime
          import pandas as pd

          # Download last 10 days of data with auto_adjust=False to get raw closes
          spx_hist = yf.download("^GSPC", period="10d", auto_adjust=False, progress=False)
          vix_hist = yf.download("^VIX",  period="10d", auto_adjust=False, progress=False)

          # Print all available rows so we can see what yfinance returns
          print("SPX rows:")
          print(spx_hist[["Close"]].tail(5).to_string())
          print("VIX rows:")
          print(vix_hist[["Close"]].tail(5).to_string())

          # Find the most recent Friday row
          def get_last_friday_row(df):
              for dt in reversed(df.index):
                  if dt.weekday() == 4:  # Friday
                      return dt, float(df.loc[dt, "Close"].iloc[0] if hasattr(df.loc[dt, "Close"], "iloc") else df.loc[dt, "Close"])
              # Fallback: last available row
              dt = df.index[-1]
              return dt, float(df.loc[dt, "Close"].iloc[0] if hasattr(df.loc[dt, "Close"], "iloc") else df.loc[dt, "Close"])

          fri_dt, spx = get_last_friday_row(spx_hist)
          # Use the same Friday date as SPX for VIX
          try:
              vix_close = float(vix_hist.loc[fri_dt, "Close"].iloc[0] if hasattr(vix_hist.loc[fri_dt, "Close"], "iloc") else vix_hist.loc[fri_dt, "Close"])
          except:
              _, vix_close = get_last_friday_row(vix_hist)
          vix_close = round(vix_close, 2)
          spx = round(spx, 2)
          vix = vix_close
          date_str = fri_dt.strftime("%Y-%m-%d")
          print(f"Using Friday: {date_str}  SPX={spx}  VIX={vix}")

          # HV20 from last 30 days
          hist30 = yf.download("^GSPC", period="30d", auto_adjust=False, progress=False)
          closes = hist30["Close"].squeeze().dropna().tolist()
          log_rets = [math.log(closes[i]/closes[i-1]) for i in range(1,len(closes)) if closes[i] and closes[i-1]]
          if len(log_rets) >= 2:
              mean = sum(log_rets)/len(log_rets)
              var = sum((r-mean)**2 for r in log_rets)/(len(log_rets)-1)
              hv20 = round(math.sqrt(var)*math.sqrt(252)*100, 2)
          else:
              hv20 = None

          # Coming week dates
          last_friday = fri_dt.to_pydatetime()
          mon = last_friday + datetime.timedelta(days=3)
          fri_next = last_friday + datetime.timedelta(days=7)
          weekof = f"{mon.month}/{mon.day}-{fri_next.month}/{fri_next.day}"
          print(f"weekof={weekof}  coming Mon={mon.date()}  Fri={fri_next.date()}")

          max_pain = None
          top_puts = []
          top_calls = []
          options_expiry = None

          try:
              spx_opts = yf.Ticker("^SPX")
              expirations = list(spx_opts.options)
              print(f"Expirations (first 8): {expirations[:8]}")

              target_exp = None
              for exp in expirations:
                  exp_date = datetime.datetime.strptime(exp, "%Y-%m-%d").date()
                  days_from_mon = (exp_date - mon.date()).days
                  if 0 <= days_from_mon <= 4:
                      target_exp = exp

              if not target_exp and expirations:
                  target_exp = expirations[0]
                  print("Fallback: using first available expiry")

              print(f"Target expiry: {target_exp}")
              exp_dt = datetime.datetime.strptime(target_exp, "%Y-%m-%d")
              options_expiry = f"{exp_dt.month}/{exp_dt.day}"

              chain = spx_opts.option_chain(target_exp)
              calls_df = chain.calls
              puts_df  = chain.puts
              print(f"Calls: {len(calls_df)}  Puts: {len(puts_df)}")

              lo, hi = spx * 0.85, spx * 1.15
              calls_df = calls_df[(calls_df["strike"] >= lo) & (calls_df["strike"] <= hi) & (calls_df["openInterest"] > 0)]
              puts_df  = puts_df[ (puts_df["strike"]  >= lo) & (puts_df["strike"]  <= hi) & (puts_df["openInterest"]  > 0)]

              call_oi = dict(zip(calls_df["strike"].tolist(), calls_df["openInterest"].tolist()))
              put_oi  = dict(zip(puts_df["strike"].tolist(),  puts_df["openInterest"].tolist()))
              all_strikes = sorted(set(list(call_oi.keys()) + list(put_oi.keys())))
              print(f"Strikes in range: {len(all_strikes)}")

              min_pain = float("inf")
              for s in all_strikes:
                  cp = sum((s-k)*oi for k,oi in call_oi.items() if k < s)
                  pp = sum((k-s)*oi for k,oi in put_oi.items()  if k > s)
                  if cp+pp < min_pain:
                      min_pain = cp+pp
                      max_pain = int(s)

              print(f"Max pain: {max_pain}")
              top_puts  = sorted([{"strike":int(k),"oi":int(v)} for k,v in put_oi.items()],  key=lambda x:-x["oi"])[:4]
              top_calls = sorted([{"strike":int(k),"oi":int(v)} for k,v in call_oi.items()], key=lambda x:-x["oi"])[:4]

          except Exception as e:
              print(f"Options error: {e}")
              import traceback; traceback.print_exc()

          payload = {
              "spx": spx, "vix": vix, "hv20": hv20,
              "date": date_str, "weekof": weekof,
              "updated": datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"),
              "options": {"expiry": options_expiry, "maxPain": max_pain, "topPuts": top_puts, "topCalls": top_calls}
          }
          with open("data/market.json", "w") as f:
              json.dump(payload, f, indent=2)
          print(f"SAVED: SPX={spx} VIX={vix} maxPain={max_pain} expiry={options_expiry} weekof={weekof}")
          PYEOF

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/market.json
          git diff --staged --quiet || git commit -m "chore: Saturday market update"
          git push
