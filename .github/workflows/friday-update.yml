name: Friday Market Update

on:
  schedule:
    - cron: '0 14 * * 6'
  workflow_dispatch:

jobs:
  update-market-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch market data and calculate max pain
        run: |
          pip install yfinance --break-system-packages -q
          python3 << 'PYEOF'
          import yfinance as yf
          import urllib.request, json, math, datetime

          HEADERS = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"}

          def fetch_chart(symbol, period="3mo"):
              url = f"https://query1.finance.yahoo.com/v8/finance/chart/{symbol}?interval=1d&range={period}"
              req = urllib.request.Request(url, headers=HEADERS)
              with urllib.request.urlopen(req, timeout=15) as r:
                  return json.loads(r.read())

          # Fetch SPX (3mo for MA50) and VIX
          spx_data = fetch_chart("%5EGSPC", "3mo")
          vix_data = fetch_chart("%5EVIX", "3mo")
          ndx_data = fetch_chart("%5ENDX", "3mo")
          vxn_data = fetch_chart("%5EVXN", "3mo")
          qqq_data = fetch_chart("QQQ", "3mo")

          spx_result = spx_data["chart"]["result"][0]
          vix_result = vix_data["chart"]["result"][0]

          spx_timestamps = spx_result["timestamp"]
          spx_closes     = spx_result["indicators"]["quote"][0]["close"]
          vix_closes     = vix_result["indicators"]["quote"][0]["close"]
          vix_timestamps = vix_result["timestamp"]

          ndx_result = ndx_data["chart"]["result"][0]
          vxn_result = vxn_data["chart"]["result"][0]
          qqq_result = qqq_data["chart"]["result"][0]
          ndx_timestamps = ndx_result["timestamp"]
          ndx_closes     = ndx_result["indicators"]["quote"][0]["close"]
          vxn_timestamps = vxn_result["timestamp"]
          vxn_closes     = vxn_result["indicators"]["quote"][0]["close"]
          qqq_timestamps = qqq_result["timestamp"]
          qqq_closes     = qqq_result["indicators"]["quote"][0]["close"]

          # Find the most recent valid trading day (Handles holiday-shortened weeks)
          last_trading_idx = len(spx_timestamps) - 1
          while last_trading_idx >= 0 and not spx_closes[last_trading_idx]:
              last_trading_idx -= 1
              
          last_trading_dt = datetime.datetime.utcfromtimestamp(spx_timestamps[last_trading_idx])
          last_friday_idx = last_trading_idx # Reusing variable name for downstream logic

          spx = round(spx_closes[last_friday_idx], 2)

          # Find VIX close for same Friday
          last_friday_vix = None
          target_date = last_friday_dt.strftime("%Y-%m-%d")
          for i in range(len(vix_timestamps)-1, -1, -1):
              dt = datetime.datetime.utcfromtimestamp(vix_timestamps[i])
              if dt.strftime("%Y-%m-%d") == target_date and vix_closes[i]:
                  last_friday_vix = vix_closes[i]
                  break
          if not last_friday_vix:
              last_friday_vix = vix_closes[-1]
          vix = round(last_friday_vix, 2)

          date_str = last_friday_dt.strftime("%Y-%m-%d")
          print(f"Friday: {date_str}  SPX={spx}  VIX={vix}")

          # 50-day MA at last_friday_idx
          ma50 = None
          stretch_pct = None
          if last_friday_idx >= 49:
              valid_50 = [c for c in spx_closes[last_friday_idx-49:last_friday_idx+1] if c]
              if len(valid_50) >= 40:
                  ma50 = round(sum(valid_50) / len(valid_50), 2)
                  stretch_pct = round(((spx - ma50) / ma50) * 100, 2)
          print(f"MA50={ma50}  Stretch={stretch_pct}%")

          # Find NDX/VXN/QQQ closes for same Friday
          def find_close_for_date(ts_list, c_list, td):
              for i in range(len(ts_list)-1, -1, -1):
                  dt = datetime.datetime.utcfromtimestamp(ts_list[i])
                  if dt.strftime("%Y-%m-%d") == td and c_list[i]:
                      return c_list[i], i
              return None, None

          ndx_val, ndx_idx = find_close_for_date(ndx_timestamps, ndx_closes, target_date)
          vxn_val, _       = find_close_for_date(vxn_timestamps, vxn_closes, target_date)
          qqq_val, _       = find_close_for_date(qqq_timestamps, qqq_closes, target_date)
          ndx = round(ndx_val, 2) if ndx_val else None
          vxn = round(vxn_val, 2) if vxn_val else None
          qqq = round(qqq_val, 2) if qqq_val else None

          # NDX 50-day MA
          ndx_ma50 = None
          ndx_stretch_pct = None
          if ndx_idx is not None and ndx_idx >= 49:
              valid_50_ndx = [c for c in ndx_closes[ndx_idx-49:ndx_idx+1] if c]
              if len(valid_50_ndx) >= 40 and ndx is not None:
                  ndx_ma50 = round(sum(valid_50_ndx) / len(valid_50_ndx), 2)
                  ndx_stretch_pct = round(((ndx - ndx_ma50) / ndx_ma50) * 100, 2)
          print(f"NDX={ndx}  VXN={vxn}  QQQ={qqq}  NDX_MA50={ndx_ma50}  NDX_Stretch={ndx_stretch_pct}%")

          # HV20
          valid_closes = [c for c in spx_closes if c]
          log_rets = [math.log(valid_closes[i]/valid_closes[i-1]) for i in range(1,len(valid_closes))]
          if len(log_rets) >= 2:
              mean = sum(log_rets)/len(log_rets)
              var = sum((r-mean)**2 for r in log_rets)/(len(log_rets)-1)
              hv20 = round(math.sqrt(var)*math.sqrt(252)*100, 2)
          else:
              hv20 = None

          # Coming week (Calculates next Mon-Fri safely from any day of the week)
          days_to_mon = (7 - last_trading_dt.weekday()) % 7 or 7
          if last_trading_dt.weekday() == 0: days_to_mon = 7
          mon = last_trading_dt + datetime.timedelta(days=days_to_mon)
          fri_next = mon + datetime.timedelta(days=4)
          weekof = f"{mon.month}/{mon.day}-{fri_next.month}/{fri_next.day}"

          # Options helper - reused for SPX/NDX/QQQ
          def compute_options(yf_symbol, price, mon_dt):
              max_pain = None
              top_puts = []
              top_calls = []
              options_expiry = None
              try:
                  t = yf.Ticker(yf_symbol)
                  expirations = list(t.options)
                  target_exp = None
                  for exp in expirations:
                      exp_date = datetime.datetime.strptime(exp, "%Y-%m-%d").date()
                      days_from_mon = (exp_date - mon_dt.date()).days
                      if 0 <= days_from_mon <= 4:
                          target_exp = exp
                  if not target_exp and expirations:
                      target_exp = expirations[0]
                  exp_dt = datetime.datetime.strptime(target_exp, "%Y-%m-%d")
                  options_expiry = f"{exp_dt.month}/{exp_dt.day}"
                  chain = t.option_chain(target_exp)
                  calls_df = chain.calls
                  puts_df  = chain.puts
                  lo, hi = price * 0.85, price * 1.15
                  calls_df = calls_df[(calls_df["strike"] >= lo) & (calls_df["strike"] <= hi) & (calls_df["openInterest"] > 0)]
                  puts_df  = puts_df[(puts_df["strike"] >= lo) & (puts_df["strike"] <= hi) & (puts_df["openInterest"] > 0)]
                  call_oi = dict(zip(calls_df["strike"].tolist(), calls_df["openInterest"].tolist()))
                  put_oi  = dict(zip(puts_df["strike"].tolist(),  puts_df["openInterest"].tolist()))
                  all_strikes = sorted(set(list(call_oi.keys()) + list(put_oi.keys())))
                  if all_strikes:
                      min_pain = float("inf")
                      for s in all_strikes:
                          cp = sum((s-k)*oi for k,oi in call_oi.items() if k < s)
                          pp = sum((k-s)*oi for k,oi in put_oi.items()  if k > s)
                          if cp+pp < min_pain:
                              min_pain = cp+pp
                              max_pain = int(s)
                      top_puts  = sorted([{"strike":int(k),"oi":int(v)} for k,v in put_oi.items()],  key=lambda x:-x["oi"])[:4]
                      top_calls = sorted([{"strike":int(k),"oi":int(v)} for k,v in call_oi.items()], key=lambda x:-x["oi"])[:4]
              except Exception as e:
                  print(f"Options error for {yf_symbol}: {e}")
              return max_pain, top_puts, top_calls, options_expiry

          # Compute options for all three tickers
          max_pain, top_puts, top_calls, options_expiry = compute_options("^SPX", spx, mon)
          print(f"SPX options: maxPain={max_pain} expiry={options_expiry} puts={len(top_puts)} calls={len(top_calls)}")
          ndx_max_pain = ndx_top_puts = ndx_top_calls = ndx_options_expiry = None
          qqq_max_pain = qqq_top_puts = qqq_top_calls = qqq_options_expiry = None
          if ndx is not None:
              ndx_max_pain, ndx_top_puts, ndx_top_calls, ndx_options_expiry = compute_options("^NDX", ndx, mon)
              print(f"NDX options: maxPain={ndx_max_pain} expiry={ndx_options_expiry} puts={len(ndx_top_puts or [])} calls={len(ndx_top_calls or [])}")
          if qqq is not None:
              qqq_max_pain, qqq_top_puts, qqq_top_calls, qqq_options_expiry = compute_options("QQQ", qqq, mon)
              print(f"QQQ options: maxPain={qqq_max_pain} expiry={qqq_options_expiry} puts={len(qqq_top_puts or [])} calls={len(qqq_top_calls or [])}")

          # ======= Individual Tickers (Options & Volatility Methods) =======
          def compute_individual_metrics(yf_symbol, mon_dt):
              try:
                  t = yf.Ticker(yf_symbol)
                  hist = t.history(period="1mo")
                  if hist.empty: return None
                  
                  # Anchor strictly to previous week's close
                  hist['date_only'] = hist.index.date
                  valid_hist = hist[hist['date_only'] < mon_dt.date()]
                  
                  if valid_hist.empty: return None
                  close_price = round(valid_hist["Close"].iloc[-1], 2)

                  expirations = list(t.options)
                  target_exp = None
                  for exp in expirations:
                      exp_date = datetime.datetime.strptime(exp, "%Y-%m-%d").date()
                      days_from_mon = (exp_date - mon_dt.date()).days
                      if 0 <= days_from_mon <= 4:
                          target_exp = exp
                  if not target_exp and expirations:
                      target_exp = expirations[0]

                  chain = t.option_chain(target_exp)
                  calls = chain.calls
                  puts = chain.puts

                  calls['dist'] = abs(calls['strike'] - close_price)
                  atm_strike = calls.loc[calls['dist'].idxmin()]['strike']

                  atm_call = calls[calls['strike'] == atm_strike].iloc[0]
                  atm_put = puts[puts['strike'] == atm_strike].iloc[0]

                  call_mark = (atm_call['bid'] + atm_call['ask']) / 2 if (atm_call['bid'] > 0 and atm_call['ask'] > 0) else atm_call['lastPrice']
                  put_mark = (atm_put['bid'] + atm_put['ask']) / 2 if (atm_put['bid'] > 0 and atm_put['ask'] > 0) else atm_put['lastPrice']

                  straddle_move = round((call_mark + put_mark) * 0.85, 2)
                  atm_iv = round(((atm_call['impliedVolatility'] + atm_put['impliedVolatility']) / 2) * 100, 2)

                  # ======= Check for Earnings This Week =======
                  earnings_this_week = False
                  try:
                      # Pull the next few upcoming earnings dates
                      earnings_df = t.get_earnings_dates(limit=5)
                      if earnings_df is not None and not earnings_df.empty:
                          fri_dt = mon_dt + datetime.timedelta(days=4)
                          
                          # Loop through to see if any fall between Monday and Friday
                          for edate in earnings_df.index:
                              naive_date = edate.to_pydatetime().replace(tzinfo=None)
                              if mon_dt.date() <= naive_date.date() <= fri_dt.date():
                                  earnings_this_week = True
                                  break
                  except Exception as e:
                      print(f"Could not fetch earnings for {yf_symbol}: {e}")

                  # Make sure to add the new flag to your return dictionary!
                  return {
                      "close": close_price,
                      "atmStrike": float(atm_strike),
                      "straddleMove": straddle_move,
                      "atmIV": atm_iv,
                      "earningsThisWeek": earnings_this_week  # <--- ADD THIS LINE
                  }

                  return {
                      "close": close_price,
                      "atmStrike": float(atm_strike),
                      "straddleMove": straddle_move,
                      "atmIV": atm_iv
                  }
              except Exception as e:
                  print(f"Error fetching individual data for {yf_symbol}: {e}")
                  return None

          individual_data = {}
          for sym in ["NVDA", "TSLA", "AAPL", "XOM", "AMZN", "GOOG", "MSFT", "META", "NFLX", "AMD", "DELL", "MU", "NOW", "CAT", "GS", "NBIS"]:
              individual_data[sym] = compute_individual_metrics(sym, mon)
              print(f"{sym} Data: {individual_data[sym]}")

          payload = {
              "spx": spx, "vix": vix, "hv20": hv20,
              "ma50": ma50, "stretch": stretch_pct,
              "ndx": ndx, "vxn": vxn, "qqq": qqq,
              "ndxMa50": ndx_ma50, "ndxStretch": ndx_stretch_pct,
              "date": date_str, "weekof": weekof,
              "updated": datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"),
              "options":    {"expiry": options_expiry,     "maxPain": max_pain,     "topPuts": top_puts,     "topCalls": top_calls},
              "ndxOptions": {"expiry": ndx_options_expiry, "maxPain": ndx_max_pain, "topPuts": ndx_top_puts or [], "topCalls": ndx_top_calls or []},
              "qqqOptions": {"expiry": qqq_options_expiry, "maxPain": qqq_max_pain, "topPuts": qqq_top_puts or [], "topCalls": qqq_top_calls or []},
              "individuals": individual_data
          }
          with open("data/market.json", "w") as f:
              json.dump(payload, f, indent=2)
          print(f"SAVED: SPX={spx} VIX={vix} MA50={ma50} stretch={stretch_pct}% maxPain={max_pain}")
          PYEOF

      - name: Update scorecard
        run: python3 scripts/update_scorecard.py

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/market.json data/scorecard.csv
          git diff --staged --quiet || git commit -m "chore: Friday market update"
          git push
