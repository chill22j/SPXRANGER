name: Daily Market Update

on:
  schedule:
    - cron: '0 21 * * 1-5'
  workflow_dispatch:
  repository_dispatch:
    types: [force_update]

jobs:
  update-market-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Fetch market data and calculate max pain
        env:
          THETA_USERNAME: ${{ secrets.THETA_USERNAME }}
          THETA_PASSWORD: ${{ secrets.THETA_PASSWORD }}
        run: |
          # Download and boot the terminal in the background
          curl -sL -o ThetaTerminal.jar https://download-stable.thetadata.us
          nohup java -jar ThetaTerminal.jar $THETA_USERNAME $THETA_PASSWORD > terminal.log 2>&1 &
          
          echo "Waiting 15 seconds for OPRA connection to establish..."
          sleep 15
          
          pip install yfinance lxml "thetadata<1.0.0" pandas python-dotenv --break-system-packages -q
          python3 << 'PYEOF'
          import yfinance as yf
          import urllib.request, json, math, datetime, time, os
          import pandas as pd
          from thetadata import ThetaClient, OptionReqType, OptionRight, DateRange

          # Connect to Terminal
          client = ThetaClient(email=os.environ["THETA_USERNAME"], password=os.environ["THETA_PASSWORD"], dataframe_type="pandas")

          HEADERS = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"}

          today_weekday = datetime.datetime.utcnow().weekday()
          is_weekend_run = today_weekday >= 4
          
          frozen_data = None
          if not is_weekend_run and os.path.exists("data/market.json"):
              try:
                  with open("data/market.json", "r") as f:
                      frozen_data = json.load(f)
                      print("Loaded frozen ranges from weekend run.")
              except Exception as e:
                  print("No frozen data found, fallback to live ranges:", e)

          def fetch_chart(symbol, period="3mo"):
              url = f"https://query1.finance.yahoo.com/v8/finance/chart/{symbol}?interval=1d&range={period}"
              req = urllib.request.Request(url, headers=HEADERS)
              for attempt in range(5):
                  try:
                      with urllib.request.urlopen(req, timeout=10) as r:
                          return json.loads(r.read())
                  except Exception as e:
                      time.sleep(3)
              raise Exception(f"Failed to fetch {symbol}")

          spx_data = fetch_chart("%5EGSPC", "3mo")
          vix_data = fetch_chart("%5EVIX", "3mo")
          ndx_data = fetch_chart("%5ENDX", "3mo")
          vxn_data = fetch_chart("%5EVXN", "3mo")
          qqq_data = fetch_chart("QQQ", "3mo")

          spx_result = spx_data["chart"]["result"][0]
          vix_result = vix_data["chart"]["result"][0]
          spx_timestamps = spx_result["timestamp"]
          spx_closes     = spx_result["indicators"]["quote"][0]["close"]
          vix_closes     = vix_result["indicators"]["quote"][0]["close"]
          vix_timestamps = vix_result["timestamp"]

          ndx_result = ndx_data["chart"]["result"][0]
          vxn_result = vxn_data["chart"]["result"][0]
          qqq_result = qqq_data["chart"]["result"][0]
          ndx_timestamps = ndx_result["timestamp"]
          ndx_closes     = ndx_result["indicators"]["quote"][0]["close"]
          vxn_timestamps = vxn_result["timestamp"]
          vxn_closes     = vxn_result["indicators"]["quote"][0]["close"]
          qqq_timestamps = qqq_result["timestamp"]
          qqq_closes     = qqq_result["indicators"]["quote"][0]["close"]

          last_trading_idx = len(spx_timestamps) - 1
          while last_trading_idx >= 0 and not spx_closes[last_trading_idx]:
              last_trading_idx -= 1
              
          last_trading_dt = datetime.datetime.utcfromtimestamp(spx_timestamps[last_trading_idx])
          last_friday_idx = last_trading_idx
          last_friday_dt = last_trading_dt
          
          target_date = last_friday_dt.strftime("%Y-%m-%d")

          if is_weekend_run:
              days_to_mon = (7 - last_trading_dt.weekday()) % 7 or 7
              if last_trading_dt.weekday() == 0: days_to_mon = 7
              mon = last_trading_dt + datetime.timedelta(days=days_to_mon)
          else:
              mon = last_trading_dt - datetime.timedelta(days=last_trading_dt.weekday())
              
          fri_next = mon + datetime.timedelta(days=4)
          live_weekof = f"{mon.month}/{mon.day}-{fri_next.month}/{fri_next.day}"
          live_date_str = last_friday_dt.strftime("%Y-%m-%d")

          today_date = datetime.datetime.utcnow().date()
          global_dte = (fri_next.date() - today_date).days

          if global_dte >= 5: global_target_delta = 0.15
          elif global_dte == 4: global_target_delta = 0.20
          elif global_dte == 3: global_target_delta = 0.25
          elif global_dte == 2: global_target_delta = 0.30
          else: global_target_delta = 0.50

          if frozen_data and "spx" in frozen_data and frozen_data.get("spx") is not None:
              spx = frozen_data.get("spx")
              vix = frozen_data.get("vix")
              ndx = frozen_data.get("ndx")
              vxn = frozen_data.get("vxn")
              qqq = frozen_data.get("qqq")
              hv20 = frozen_data.get("hv20")
              ma50 = frozen_data.get("ma50")
              stretch_pct = frozen_data.get("stretch")
              ndx_ma50 = frozen_data.get("ndxMa50")
              ndx_stretch_pct = frozen_data.get("ndxStretch")
              weekof = frozen_data.get("weekof", live_weekof)
              date_str = frozen_data.get("date", live_date_str)
              
              max_pain = frozen_data.get("options", {}).get("maxPain")
              top_puts = frozen_data.get("options", {}).get("topPuts", [])
              top_calls = frozen_data.get("options", {}).get("topCalls", [])
              options_expiry = frozen_data.get("options", {}).get("expiry")
          else:
              spx = round(spx_closes[last_friday_idx], 2)
              last_friday_vix = vix_closes[-1]
              for i in range(len(vix_timestamps)-1, -1, -1):
                  dt = datetime.datetime.utcfromtimestamp(vix_timestamps[i])
                  if dt.strftime("%Y-%m-%d") == target_date and vix_closes[i]:
                      last_friday_vix = vix_closes[i]; break
              vix = round(last_friday_vix, 2)

              ma50 = stretch_pct = None
              if last_friday_idx >= 49:
                  valid_50 = [c for c in spx_closes[last_friday_idx-49:last_friday_idx+1] if c]
                  if len(valid_50) >= 40:
                      ma50 = round(sum(valid_50) / len(valid_50), 2)
                      stretch_pct = round(((spx - ma50) / ma50) * 100, 2)

              def find_close(ts_list, c_list, td):
                  for i in range(len(ts_list)-1, -1, -1):
                      dt = datetime.datetime.utcfromtimestamp(ts_list[i])
                      if dt.strftime("%Y-%m-%d") == td and c_list[i]: return c_list[i], i
                  return None, None

              ndx_val, ndx_idx = find_close(ndx_timestamps, ndx_closes, target_date)
              vxn_val, _       = find_close(vxn_timestamps, vxn_closes, target_date)
              qqq_val, _       = find_close(qqq_timestamps, qqq_closes, target_date)
              ndx = round(ndx_val, 2) if ndx_val else None
              vxn = round(vxn_val, 2) if vxn_val else None
              qqq = round(qqq_val, 2) if qqq_val else None

              ndx_ma50 = ndx_stretch_pct = None
              if ndx_idx is not None and ndx_idx >= 49:
                  valid_50_ndx = [c for c in ndx_closes[ndx_idx-49:ndx_idx+1] if c]
                  if len(valid_50_ndx) >= 40 and ndx is not None:
                      ndx_ma50 = round(sum(valid_50_ndx) / len(valid_50_ndx), 2)
                      ndx_stretch_pct = round(((ndx - ndx_ma50) / ndx_ma50) * 100, 2)

              valid_closes = [c for c in spx_closes if c]
              log_rets = [math.log(valid_closes[i]/valid_closes[i-1]) for i in range(1,len(valid_closes))]
              hv20 = round(math.sqrt(sum((r-(sum(log_rets)/len(log_rets)))**2 for r in log_rets)/(len(log_rets)-1))*math.sqrt(252)*100, 2) if len(log_rets) >= 2 else None
              weekof, date_str = live_weekof, live_date_str

              max_pain = None; top_puts = []; top_calls = []; options_expiry = None

          def compute_individual_metrics(display_name, yf_symbol, mon_dt, index_baselines, frozen_stock_data, theta_client, req_date):
              try:
                  # 1. Fetch live closing price bypassing yfinance entirely
                  chart_data = fetch_chart(yf_symbol, "3mo")
                  closes = chart_data["chart"]["result"][0]["indicators"]["quote"][0]["close"]
                  valid_closes = [c for c in closes if c and c > 0]
                  if not valid_closes: return None
                  live_close = round(valid_closes[-1], 2)
                  
                  # 2. Calculate Historical Volatility natively
                  ticker_hv = 0.20
                  if len(valid_closes) > 2:
                      log_rets = []
                      for i in range(1, len(valid_closes)):
                          ratio = valid_closes[i] / valid_closes[i-1]
                          if 0.5 < ratio < 2.0: log_rets.append(math.log(ratio))
                      if len(log_rets) > 1:
                          avg_ret = sum(log_rets) / len(log_rets)
                          var = sum((r - avg_ret)**2 for r in log_rets) / (len(log_rets) - 1)
                          ticker_hv = math.sqrt(var) * math.sqrt(252)
                          if ticker_hv <= 0.05: ticker_hv = 0.05

                  # 3. Determine clean OPRA ticker
                  if display_name == "SPX": theta_sym = "SPXW"
                  elif display_name == "NDX": theta_sym = "NDXP"
                  else: theta_sym = yf_symbol

                  # 4. Get Expirations directly from Theta Data
                  expirations = theta_client.get_expirations(root=theta_sym)
                  if not expirations: return None
                  
                  expirations.sort()
                  target_exp = expirations[0]
                  for exp_date in expirations:
                      if 0 <= (exp_date - mon_dt.date()).days <= 4:
                          target_exp = exp_date; break

                  days_to_exp = max((target_exp - datetime.datetime.utcnow().date()).days, 1)

                  if days_to_exp >= 5: global_target_delta = 0.15
                  elif days_to_exp == 4: global_target_delta = 0.20
                  elif days_to_exp == 3: global_target_delta = 0.25
                  elif days_to_exp == 2: global_target_delta = 0.30
                  else: global_target_delta = 0.50

                  baseline_ticker = "QQQ" if yf_symbol in index_baselines["NASDAQ"] else "SPY"
                  
                  range_close = frozen_stock_data.get("close", live_close) if frozen_stock_data else live_close
                  atm_strike = straddle_move = atm_iv = 0.0
                  earnings_this_week = False
                  
                  if frozen_stock_data:
                      atm_strike = frozen_stock_data.get("atmStrike", 0.0)
                      straddle_move = frozen_stock_data.get("straddleMove", 0.0)
                      atm_iv = frozen_stock_data.get("atmIV", 0.0)
                      earnings_this_week = frozen_stock_data.get("earningsThisWeek", False)

                  # 5. Fetch the strict End-of-Day OPRA feed
                  chain = None
                  try:
                      chain = theta_client.get_hist_option(
                          req=OptionReqType.EOD,
                          root=theta_sym,
                          exp=target_exp,
                          date_range=DateRange(req_date, req_date)
                      )
                  except Exception as e:
                      print(f"Data not ready for {theta_sym}: {e}")

                  # Graceful Fallback if market is still open and feed is empty
                  if chain is None or chain.empty:
                      return {
                          "close": range_close, "livePrice": live_close, "atmStrike": atm_strike,
                          "straddleMove": straddle_move, "atmIV": atm_iv,
                          "earningsThisWeek": earnings_this_week, "baseline": baseline_ticker
                      }
                      
                  calls = chain[chain['right'] == OptionRight.CALL].copy()
                  puts = chain[chain['right'] == OptionRight.PUT].copy()
                  
                  if not frozen_stock_data:
                      calls['dist'] = (calls['strike'] - range_close).abs()
                      puts['dist'] = (puts['strike'] - range_close).abs()
                      atm_call = calls.loc[calls['dist'].idxmin()]
                      atm_put = puts.loc[puts['dist'].idxmin()]
                      
                      atm_strike = float(atm_call['strike'])
                      straddle_move = round((float(atm_call['close']) + float(atm_put['close'])) * 0.85, 2)
                      atm_iv = round(((float(atm_call['iv']) + float(atm_put['iv'])) / 2) * 100, 2)

                  calls['delta_diff'] = (calls['delta'].abs() - global_target_delta).abs()
                  best_call = calls.loc[calls['delta_diff'].idxmin()]
                  
                  puts['delta_diff'] = (puts['delta'].abs() - global_target_delta).abs()
                  best_put = puts.loc[puts['delta_diff'].idxmin()]
                  
                  best_call_strike = float(best_call['strike'])
                  best_put_strike = float(best_put['strike'])
                  best_call_delta = float(best_call['delta'])
                  best_put_delta = float(best_put['delta'])
                  best_call_price = float(best_call['close'])
                  best_put_price = float(best_put['close'])

                  expected_move = ticker_hv * math.sqrt(days_to_exp / 252)
                  if expected_move <= 0: expected_move = 0.001 
                  
                  call_pvi = int(round(((best_call_price / best_call_strike if best_call_strike else 0) / expected_move) * 1000))
                  put_pvi = int(round(((best_put_price / best_put_strike if best_put_strike else 0) / expected_move) * 1000))

                  return {
                      "close": range_close, "livePrice": live_close, "atmStrike": atm_strike,
                      "straddleMove": straddle_move, "atmIV": atm_iv,
                      "earningsThisWeek": earnings_this_week, "baseline": baseline_ticker,
                      "call15Strike": float(best_call_strike), "call15Price": round(best_call_price, 2),
                      "call15Delta": round(best_call_delta, 2), "call15Pvi": call_pvi,
                      "put15Strike": float(best_put_strike), "put15Price": round(best_put_price, 2),
                      "put15Delta": round(best_put_delta, 2), "put15Pvi": put_pvi
                  }
              except Exception as e:
                  print(f"Error processing {yf_symbol}: {e}")
                  return None

          individual_data = {}
          ticker_map = {
              "SPX": "%5EGSPC", "NDX": "%5ENDX", "SPY": "SPY", "QQQ": "QQQ",
              "NVDA": "NVDA", "TSLA": "TSLA", "AAPL": "AAPL", "XOM": "XOM", 
              "AMZN": "AMZN", "GOOG": "GOOG", "MSFT": "MSFT", "META": "META", 
              "NFLX": "NFLX", "AMD": "AMD", "DELL": "DELL", "MU": "MU", 
              "NOW": "NOW", "CAT": "CAT", "GS": "GS", "NBIS": "NBIS"
          }
          baselines = {
              "NASDAQ": ["NVDA", "TSLA", "AAPL", "AMZN", "GOOG", "MSFT", "META", "NFLX", "AMD", "DELL", "MU", "NOW", "NBIS", "QQQ", "^NDX"]
          }
          
          req_dt = (datetime.datetime.utcnow() - datetime.timedelta(days=1)).date()
          for display_name, yf_sym in ticker_map.items():
              f_data = frozen_data.get("individuals", {}).get(display_name) if frozen_data else None
              individual_data[display_name] = compute_individual_metrics(display_name, yf_sym, mon, baselines, f_data, client, req_dt)
              print(f"{display_name} Data OK")
              time.sleep(0.5) 

          payload = {
              "spx": spx, "vix": vix, "hv20": hv20, "ma50": ma50, "stretch": stretch_pct,
              "ndx": ndx, "vxn": vxn, "qqq": qqq, "ndxMa50": ndx_ma50, "ndxStretch": ndx_stretch_pct,
              "date": date_str, "weekof": weekof, "targetDelta": global_target_delta,
              "updated": datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"),
              "options":    {"expiry": options_expiry, "maxPain": max_pain, "topPuts": top_puts, "topCalls": top_calls},
              "ndxOptions": {"expiry": None, "maxPain": None, "topPuts": [], "topCalls": []},
              "qqqOptions": {"expiry": None, "maxPain": None, "topPuts": [], "topCalls": []},
              "individuals": individual_data
          }
          with open("data/market.json", "w") as f:
              json.dump(payload, f, indent=2)
          PYEOF

      - name: Update scorecard
        run: python3 scripts/update_scorecard.py || echo "No scorecard script found"

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/market.json || true
          git add data/scorecard.csv || true
          git diff --staged --quiet || git commit -m "chore: Daily automated market update"
          git push
