<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Options Bridge</title>
<style>
  body { background:#0a0a0f; color:#e8e8f0; font-family:monospace; padding:20px; font-size:13px; }
  #status { color:#4af0a0; margin-bottom:10px; font-size:14px; }
  #log { color:#888; font-size:11px; line-height:1.8; }
</style>
</head>
<body>
<div id="status">Initializing...</div>
<div id="log"></div>
<script>
function log(msg) { document.getElementById('log').innerHTML += msg + '<br>'; }
function setStatus(msg) { document.getElementById('status').textContent = msg; }

async function fetchAndSend(spx, pviLow) {
  setStatus('Fetching crumb...');

  // All direct — no proxy needed from Yahoo Finance domain
  const crumb = await fetch('https://query1.finance.yahoo.com/v1/test/getcrumb', {credentials:'include'}).then(r=>r.text());
  log('Crumb: ' + crumb.slice(0,12) + '...');
  if (!crumb || crumb.length < 3) throw new Error('No crumb obtained');

  setStatus('Fetching expirations...');
  const d0 = await fetch(
    'https://query1.finance.yahoo.com/v7/finance/options/%5ESPX?crumb=' + encodeURIComponent(crumb),
    {credentials:'include'}
  ).then(r=>r.json());

  const exps = d0?.optionChain?.result?.[0]?.expirationDates || [];
  log('Expirations: ' + exps.length);
  if (!exps.length) throw new Error('No expirations returned');

  // Last expiry within the next 8 days (end of current week)
  const now = Date.now() / 1000;
  const weekExps = exps.filter(ts => ts > now && ts < now + 8 * 86400);
  const targetTs = weekExps[weekExps.length - 1];
  if (!targetTs) throw new Error('No weekly expiry found');

  const expDate = new Date(targetTs * 1000);
  const expLabel = (expDate.getMonth() + 1) + '/' + expDate.getDate();
  log('Weekly expiry: ' + expDate.toDateString());
  setStatus('Fetching ' + expLabel + ' options chain...');

  const d1 = await fetch(
    'https://query1.finance.yahoo.com/v7/finance/options/%5ESPX?date=' + targetTs + '&crumb=' + encodeURIComponent(crumb),
    {credentials:'include'}
  ).then(r=>r.json());

  const result = d1?.optionChain?.result?.[0];
  if (!result) throw new Error('No options data');

  const calls = result.options[0].calls || [];
  const puts  = result.options[0].puts  || [];
  log('Calls: ' + calls.length + ' | Puts: ' + puts.length);

  const lo = spx * 0.85, hi = spx * 1.15;
  const callOI = {}, putOI = {};
  calls.filter(c=>c.openInterest>0&&c.strike>=lo&&c.strike<=hi).forEach(c=>callOI[c.strike]=c.openInterest);
  puts.filter(p=>p.openInterest>0&&p.strike>=lo&&p.strike<=hi).forEach(p=>putOI[p.strike]=p.openInterest);

  const allStrikes = [...new Set([...Object.keys(callOI),...Object.keys(putOI)].map(Number))].sort((a,b)=>a-b);
  log('Strikes in range: ' + allStrikes.length);
  if (!allStrikes.length) throw new Error('No OI data in range');

  let minPain = Infinity, maxPainStrike = null;
  for (const s of allStrikes) {
    const cp = Object.entries(callOI).reduce((sum,[k,oi])=>+k<s?sum+(s-+k)*oi:sum,0);
    const pp = Object.entries(putOI).reduce((sum,[k,oi])=>+k>s?sum+(+k-s)*oi:sum,0);
    if (cp+pp<minPain){minPain=cp+pp;maxPainStrike=s;}
  }
  log('Max pain: ' + maxPainStrike);

  const topPuts  = Object.entries(putOI).sort(([,a],[,b])=>b-a).slice(0,4).map(([k,oi])=>({strike:+k,oi}));
  const topCalls = Object.entries(callOI).sort(([,a],[,b])=>b-a).slice(0,4).map(([k,oi])=>({strike:+k,oi}));

  const payload = {type:'OPTIONS_DATA', maxPain:maxPainStrike, expiry:expLabel, topPuts, topCalls, spx, pviLow};

  setStatus('Done! Sending to app...');
  if (window.opener && !window.opener.closed) {
    window.opener.postMessage(payload, '*');
    log('Sent to app successfully!');
    setTimeout(() => window.close(), 1500);
  } else {
    log('No opener - data: max pain=' + maxPainStrike);
    setStatus('Done: max pain = ' + maxPainStrike);
  }
}

async function run() {
  try {
    const params = new URLSearchParams(window.location.search);
    const spx    = parseFloat(params.get('spx') || '0');
    const pviLow = parseFloat(params.get('low') || '0');
    log('SPX: ' + spx + ' | VIX Low: ' + pviLow);

    // Check if we just returned from Yahoo Finance redirect
    const phase = sessionStorage.getItem('bridge_phase');
    if (phase === 'get_crumb') {
      sessionStorage.removeItem('bridge_phase');
      log('Returned from Yahoo Finance.');
      await fetchAndSend(spx, pviLow);
      return;
    }

    // First try: fetch crumb directly (works if user already has Yahoo session)
    setStatus('Trying direct crumb fetch...');
    let crumbOk = false;
    try {
      const cr = await fetch('https://query1.finance.yahoo.com/v1/test/getcrumb', {credentials:'include'});
      const crumb = await cr.text();
      if (crumb && crumb.length >= 3 && !crumb.includes('<') && !crumb.includes('Unauthorized')) {
        crumbOk = true;
        log('Direct crumb worked!');
        await fetchAndSend(spx, pviLow);
        return;
      }
    } catch(e) {
      log('Direct crumb error: ' + e.message);
    }

    // Fallback: redirect to Yahoo Finance to establish session
    log('Redirecting to Yahoo Finance to establish session...');
    setStatus('Redirecting to Yahoo Finance...');
    sessionStorage.setItem('bridge_phase', 'get_crumb');
    setTimeout(() => {
      window.location.href = 'https://finance.yahoo.com/quote/%5ESPX/options/?redirect_uri=' +
        encodeURIComponent(window.location.href);
    }, 600);

  } catch(e) {
    log('Error: ' + e.message);
    setStatus('Failed: ' + e.message);
    if (window.opener) window.opener.postMessage({type:'OPTIONS_ERROR', error:e.message}, '*');
  }
}

run();
</script>
</body>
</html>
